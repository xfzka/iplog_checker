    #     # 默认值: 空 (推送到所有设备)
    #     # 设备昵称可在 Pushbullet 设置中查看
    #     device_id: ""

    # ========================================
    # 8. RocketChat
    # ========================================
    # 适用于: 使用 Rocket.Chat 的团队
    # 参考: https://github.com/nikoksr/notify/tree/main/service/rocketchat
    # - service: "rocketchat"
    #   threshold: 5
    #   payload_template: "🚨 Risk IP: {{.IP}} detected {{.Count}} times from log {{.SourceLogInfo.Name}}, risk list: {{.SourceListInfo.Name}}"
    #   config:
    #     # Rocket.Chat 服务器地址 (必填)
    #     # 示例: "chat.example.com" 或 "localhost:3000"
    #     url: "your-rocketchat-server.com"
    #     # 协议 (必填)
